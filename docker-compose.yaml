services:
  reservations:
    build:
      context: .
      dockerfile: apps/reservations/Dockerfile
      target: development
    volumes:
      - .:/usr/src/app
    ports:
      - '3000:3000'
    command: yarn start:dev reservations
    env_file:
      - apps/reservations/.env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - '5432:5432'
