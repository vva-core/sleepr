services:
  reservations:
    build:
      context: .
      dockerfile: apps/reservations/Dockerfile
      target: development
    volumes:
      - .:/usr/src/app
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && yarn start:dev reservations"
    env_file:
      - apps/reservations/.env
    depends_on:
      - postgres

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
      target: development
    volumes:
      - .:/usr/src/app
    ports:
      - '3001:3001'
    command: sh -c "npx prisma migrate deploy && yarn start:dev auth"
    env_file:
      - apps/auth/.env
    depends_on:
      - postgres

  payments:
    build:
      context: .
      dockerfile: apps/payments/Dockerfile
      target: development
    volumes:
      - .:/usr/src/app
    ports:
      - '3002:3002'
    command: sh -c "npx prisma migrate deploy && yarn start:dev payments"
    env_file:
      - apps/payments/.env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    ports:
      - '8080:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
